services:
  ecoflow-dashboard:
    build: .
    container_name: ecoflow-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/pi/automation_data/ecoflow_credentials.txt:/app/ecoflow_credentials.txt:ro
      - /home/pi/automation_data/ecoflow_thresholds.json:/app/ecoflow_thresholds.json
      - /home/pi/automation_data/ecoflow_state.json:/app/ecoflow_state.json
      - /home/pi/automation_data/logs:/app/logs
      - /home/pi/automation_data/kia_credentials.txt:/app/kia_credentials.txt:ro
      - /home/pi/automation_data/kia_token.json:/app/kia_token.json
      - /home/pi/automation_data/enphase_credentials.txt:/app/enphase_credentials.txt:ro
    networks:
      - ecoflow-net

  arbiter:
    build:
      context: .
      dockerfile: Dockerfile.arbiter
    container_name: arbiter
    restart: unless-stopped
    environment:
      - TZ=America/Chicago
      - DASHBOARD_URL=http://ecoflow-dashboard:5000
      - ARBITER_DRY_RUN=true
      - ARBITER_POLL_INTERVAL=30
      - TD_RATE=8.5
      - MAX_CHARGE_ENERGY_PRICE=4.0
      - SAFETY_MARGIN_CENTS=3.0
      - MIN_DISCHARGE_ENERGY_PRICE=3.0
      - SPIKE_OVERRIDE_TOTAL_PRICE=23.5
    volumes:
      - /home/pi/automation_data/logs:/app/logs
    networks:
      - ecoflow-net
    depends_on:
      - ecoflow-dashboard

networks:
  ecoflow-net:
    driver: bridge
